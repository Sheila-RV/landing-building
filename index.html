<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quantic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #000000;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    img {
      width: 400px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
      letter-spacing: 2px;
    }

    p {
      margin-top: 15px;
      font-size: 1.1rem;
      opacity: 0.7;
    }

    .badge {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #22d3ee;
      letter-spacing: 1px;
    }

    .line {
      width: 60px;
      height: 3px;
      background: #22d3ee;
      margin: 20px auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.jpg" alt="Quantic Logo" >

    <!-- <h1>QUANTIC</h1> -->

    <!-- <div class="line"></div> -->

    <p>
      Construyendo automatizaciones inteligentes para empresas modernas
    </p>

    <div class="badge">
      🚧 Coming soon...
    </div>
  </div>
</body>
</html>
